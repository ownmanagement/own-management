<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWN Architecture | Estudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Reset y tipografía global */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #111111;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Líneas divisorias muy finas para estructurar el espacio */
        .line {
            height: 1px;
            background-color: #e5e5e5;
            width: 100%;
        }

        /* Navegación Minimalista */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            z-index: 1000;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); /* Efecto vidrio esmerilado sutil */
            border-bottom: 1px solid #f0f0f0;
        }

        .logo {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        nav a {
            text-decoration: none;
            color: #777777;
            margin-left: 40px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #111111;
        }

        /* Portada Ultra-Minimalista (Luz y Espacio) */
        .hero-section {
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 8%;
            background-color: #fafafa;
            position: relative;
        }

        /* Imagen de fondo muy sutil y clara en el lado derecho */
        .hero-bg {
            position: absolute;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            opacity: 0.9;
        }

        .hero-content {
            max-width: 550px;
            z-index: 10;
            position: relative;
        }

        .hero-content span {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #888888;
            display: block;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .hero-content h1 {
            font-size: 3.2rem;
            font-weight: 300;
            line-height: 1.15;
            letter-spacing: -2px;
            color: #111111;
            margin-bottom: 30px;
        }

        .hero-content p {
            font-size: 1rem;
            color: #666666;
            font-weight: 300;
            line-height: 1.8;
        }

        /* Sección Sobre Nosotros (Espacio en Blanco Editorial) */
        .about-section {
            padding: 160px 8%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 100px;
            align-items: flex-start;
        }

        .about-text h2 {
            font-size: 2.2rem;
            font-weight: 300;
            line-height: 1.3;
            letter-spacing: -1px;
            color: #111111;
        }

        .about-details p {
            color: #666666;
            font-size: 0.95rem;
            line-height: 1.9;
            font-weight: 300;
            margin-bottom: 30px;
        }
